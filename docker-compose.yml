# GuiaFlow — desenvolvimento local com Docker
#
# Subir tudo:     docker compose up -d --build
# Só Mongo:       docker compose up -d mongo
# Logs API:       docker compose logs -f api
# Parar:          docker compose down
#
# Frontend (Expo) continua no host:
#   cd frontend && npx expo start --web
#   EXPO_PUBLIC_BACKEND_URL=http://localhost:8000

services:
  mongo:
    image: mongo:7
    container_name: guiaflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - guiaflow_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: test_database
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: guiaflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guiaflow-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: test_database
      AUTH_COOKIE_SECURE: "false"
      REDIS_URL: redis://redis:6379/0
      WHATSAPP_PROVIDER: apibrasil
    volumes:
      - ./backend:/app
    command: uvicorn server:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  guiaflow_mongo_data:
